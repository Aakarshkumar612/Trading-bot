<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Bot — Binance Futures</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050a0e;
    --surface: #0c1519;
    --surface2: #111e24;
    --border: #1a2e38;
    --accent: #00e5ff;
    --accent2: #00ff88;
    --danger: #ff4466;
    --warning: #ffaa00;
    --text: #e8f4f8;
    --muted: #4a7080;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 48px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .logo-text h1 {
    font-family: var(--sans);
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .logo-text p {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    background: rgba(0,255,136,0.08);
    border: 1px solid rgba(0,255,136,0.2);
    border-radius: 20px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent2);
    letter-spacing: 1px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    background: var(--accent2);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* Main grid */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  @media (max-width: 640px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }

  .card-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  /* Form elements */
  .form-group {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    appearance: none;
  }

  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
  }

  input::placeholder { color: var(--muted); }

  /* Side selector */
  .side-selector {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .side-btn {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    font-weight: 700;
  }

  .side-btn:hover { border-color: var(--accent); color: var(--text); }

  .side-btn.active-buy {
    background: rgba(0,255,136,0.1);
    border-color: var(--accent2);
    color: var(--accent2);
  }

  .side-btn.active-sell {
    background: rgba(255,68,102,0.1);
    border-color: var(--danger);
    color: var(--danger);
  }

  /* Type selector */
  .type-selector {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }

  .type-btn {
    padding: 8px 4px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .type-btn:hover { border-color: var(--accent); color: var(--text); }
  .type-btn.active {
    background: rgba(0,229,255,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Conditional fields */
  .conditional { display: none; }
  .conditional.visible { display: block; }

  /* Submit button */
  .submit-btn {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: none;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    position: relative;
    overflow: hidden;
  }

  .submit-btn.buy {
    background: var(--accent2);
    color: #050a0e;
  }

  .submit-btn.sell {
    background: var(--danger);
    color: #fff;
  }

  .submit-btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Loading spinner */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Response panel */
  .response-card {
    grid-column: 1 / -1;
    display: none;
  }

  .response-card.visible { display: block; }

  .response-card.success { border-color: rgba(0,255,136,0.3); }
  .response-card.error { border-color: rgba(255,68,102,0.3); }

  .response-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .response-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .response-icon.success { background: rgba(0,255,136,0.15); }
  .response-icon.error { background: rgba(255,68,102,0.15); }

  .response-title {
    font-size: 15px;
    font-weight: 600;
  }

  .response-title.success { color: var(--accent2); }
  .response-title.error { color: var(--danger); }

  /* Order details grid */
  .order-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }

  .order-field {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }

  .order-field-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .order-field-value {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    font-weight: 700;
  }

  .order-field-value.filled { color: var(--accent2); }
  .order-field-value.new { color: var(--accent); }

  /* Log panel */
  .log-panel {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-top: 16px;
    max-height: 160px;
    overflow-y: auto;
  }

  .log-entry {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    line-height: 1.8;
    border-bottom: 1px solid var(--border);
    padding: 4px 0;
    animation: fadeIn 0.3s ease;
  }

  .log-entry:last-child { border-bottom: none; }
  .log-entry .ts { color: var(--muted); }
  .log-entry .level-info { color: var(--accent); }
  .log-entry .level-error { color: var(--danger); }
  .log-entry .level-success { color: var(--accent2); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  /* Error message */
  .error-msg {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--danger);
    background: rgba(255,68,102,0.08);
    border: 1px solid rgba(255,68,102,0.2);
    border-radius: 8px;
    padding: 12px 14px;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">
        <h1>Trading Bot</h1>
        <p>Binance Futures Testnet</p>
      </div>
    </div>
    <div class="status-badge">
      <div class="status-dot"></div>
      DEMO TRADING
    </div>
  </header>

  <div class="main-grid">

    <!-- Order Form -->
    <div class="card">
      <div class="card-title">// Place Order</div>

      <div class="form-group">
        <label>Symbol</label>
        <input type="text" id="symbol" value="BTCUSDT" placeholder="BTCUSDT">
      </div>

      <div class="form-group">
        <label>Side</label>
        <div class="side-selector">
          <div class="side-btn active-buy" id="btn-buy" onclick="setSide('BUY')">BUY</div>
          <div class="side-btn" id="btn-sell" onclick="setSide('SELL')">SELL</div>
        </div>
      </div>

      <div class="form-group">
        <label>Order Type</label>
        <div class="type-selector">
          <div class="type-btn active" id="btn-market" onclick="setType('MARKET')">MARKET</div>
          <div class="type-btn" id="btn-limit" onclick="setType('LIMIT')">LIMIT</div>
          <div class="type-btn" id="btn-stop" onclick="setType('STOP_MARKET')">STOP</div>
        </div>
      </div>

      <div class="form-group">
        <label>Quantity</label>
        <input type="number" id="quantity" value="0.002" step="0.001" min="0.001" placeholder="0.002">
      </div>

      <div class="form-group conditional" id="price-group">
        <label>Limit Price (USDT)</label>
        <input type="number" id="price" placeholder="e.g. 100000" step="0.01">
      </div>

      <div class="form-group conditional" id="stop-group">
        <label>Stop Price (USDT)</label>
        <input type="number" id="stop_price" placeholder="e.g. 80000" step="0.01">
      </div>

      <button class="submit-btn buy" id="submit-btn" onclick="placeOrder()">
        PLACE BUY ORDER
      </button>
    </div>

    <!-- Order Summary -->
    <div class="card">
      <div class="card-title">// Order Preview</div>

      <div class="order-grid" id="preview-grid">
        <div class="order-field">
          <div class="order-field-label">Symbol</div>
          <div class="order-field-value" id="prev-symbol">BTCUSDT</div>
        </div>
        <div class="order-field">
          <div class="order-field-label">Side</div>
          <div class="order-field-value" id="prev-side" style="color:var(--accent2)">BUY</div>
        </div>
        <div class="order-field">
          <div class="order-field-label">Type</div>
          <div class="order-field-value" id="prev-type">MARKET</div>
        </div>
        <div class="order-field">
          <div class="order-field-label">Quantity</div>
          <div class="order-field-value" id="prev-qty">0.002</div>
        </div>
        <div class="order-field">
          <div class="order-field-label">Price</div>
          <div class="order-field-value" id="prev-price">Market</div>
        </div>
        <div class="order-field">
          <div class="order-field-label">Est. Notional</div>
          <div class="order-field-value" id="prev-notional">~$168</div>
        </div>
      </div>

      <div class="card-title" style="margin-top:20px">// Activity Log</div>
      <div class="log-panel" id="log-panel">
        <div class="log-entry">
          <span class="level-info">INFO</span>
          <span class="ts"> — Bot initialised. Ready to trade.</span>
        </div>
      </div>
    </div>

    <!-- Response -->
    <div class="card response-card" id="response-card">
      <div class="response-header">
        <div class="response-icon" id="resp-icon"></div>
        <div class="response-title" id="resp-title"></div>
      </div>
      <div id="resp-body"></div>
    </div>

  </div>
</div>

<script>
  let currentSide = 'BUY';
  let currentType = 'MARKET';
  const BTC_PRICE = 84000;

  function setSide(side) {
    currentSide = side;
    document.getElementById('btn-buy').className = 'side-btn' + (side === 'BUY' ? ' active-buy' : '');
    document.getElementById('btn-sell').className = 'side-btn' + (side === 'SELL' ? ' active-sell' : '');
    const btn = document.getElementById('submit-btn');
    btn.className = 'submit-btn ' + side.toLowerCase();
    btn.textContent = `PLACE ${side} ORDER`;
    document.getElementById('prev-side').textContent = side;
    document.getElementById('prev-side').style.color = side === 'BUY' ? 'var(--accent2)' : 'var(--danger)';
    updatePreview();
  }

  function setType(type) {
    currentType = type;
    ['market','limit','stop'].forEach(t => {
      document.getElementById('btn-' + t).className = 'type-btn';
    });
    const map = { MARKET: 'market', LIMIT: 'limit', STOP_MARKET: 'stop' };
    document.getElementById('btn-' + map[type]).className = 'type-btn active';
    document.getElementById('price-group').className = 'form-group conditional' + (type === 'LIMIT' ? ' visible' : '');
    document.getElementById('stop-group').className = 'form-group conditional' + (type === 'STOP_MARKET' ? ' visible' : '');
    document.getElementById('prev-type').textContent = type;
    updatePreview();
  }

  function updatePreview() {
    const sym = document.getElementById('symbol').value || 'BTCUSDT';
    const qty = parseFloat(document.getElementById('quantity').value) || 0;
    const price = document.getElementById('price').value;
    document.getElementById('prev-symbol').textContent = sym.toUpperCase();
    document.getElementById('prev-qty').textContent = qty;
    document.getElementById('prev-price').textContent =
      currentType === 'LIMIT' && price ? '$' + parseFloat(price).toLocaleString() :
      currentType === 'STOP_MARKET' ? 'Stop' : 'Market';
    document.getElementById('prev-notional').textContent = '~$' + Math.round(qty * BTC_PRICE).toLocaleString();
  }

  function addLog(level, msg) {
    const panel = document.getElementById('log-panel');
    const now = new Date().toLocaleTimeString();
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.innerHTML = `<span class="level-${level}">${level.toUpperCase()}</span> <span class="ts">${now}</span> — ${msg}`;
    panel.appendChild(div);
    panel.scrollTop = panel.scrollHeight;
  }

  async function placeOrder() {
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span>Placing order...`;

    const body = {
      symbol: document.getElementById('symbol').value.trim().toUpperCase(),
      side: currentSide,
      order_type: currentType,
      quantity: parseFloat(document.getElementById('quantity').value),
      price: document.getElementById('price').value || null,
      stop_price: document.getElementById('stop_price').value || null,
    };

    addLog('info', `Placing ${body.order_type} ${body.side} ${body.symbol} qty=${body.quantity}`);

    try {
      const resp = await fetch('/api/order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const result = await resp.json();
      const card = document.getElementById('response-card');
      card.className = 'card response-card visible';

      if (result.success) {
        const d = result.data;
        addLog('success', `Order filled! orderId=${d.orderId} status=${d.status}`);
        card.classList.add('success');
        card.classList.remove('error');
        document.getElementById('resp-icon').className = 'response-icon success';
        document.getElementById('resp-icon').textContent = '✓';
        document.getElementById('resp-title').className = 'response-title success';
        document.getElementById('resp-title').textContent = `Order Placed Successfully — ID: ${d.orderId}`;

        const fields = [
          ['Order ID', d.orderId],
          ['Symbol', d.symbol],
          ['Status', d.status],
          ['Type', d.type],
          ['Side', d.side],
          ['Requested Qty', d.origQty],
          ['Executed Qty', d.executedQty],
          ['Avg Price', d.avgPrice && d.avgPrice !== '0' ? '$' + parseFloat(d.avgPrice).toLocaleString() : '—'],
          ['Limit Price', d.price && d.price !== '0' ? '$' + parseFloat(d.price).toLocaleString() : '—'],
        ].filter(([, v]) => v && v !== 'undefined');

        document.getElementById('resp-body').innerHTML = `
          <div class="order-grid">
            ${fields.map(([label, val]) => `
              <div class="order-field">
                <div class="order-field-label">${label}</div>
                <div class="order-field-value ${val === 'FILLED' ? 'filled' : val === 'NEW' ? 'new' : ''}">${val}</div>
              </div>
            `).join('')}
          </div>`;
      } else {
        addLog('error', `Failed: ${result.error}`);
        card.classList.add('error');
        card.classList.remove('success');
        document.getElementById('resp-icon').className = 'response-icon error';
        document.getElementById('resp-icon').textContent = '✕';
        document.getElementById('resp-title').className = 'response-title error';
        document.getElementById('resp-title').textContent = 'Order Failed';
        document.getElementById('resp-body').innerHTML = `<div class="error-msg">${result.error}</div>`;
      }
    } catch (e) {
      addLog('error', `Network error: ${e.message}`);
    } finally {
      btn.disabled = false;
      btn.innerHTML = `PLACE ${currentSide} ORDER`;
    }
  }

  // Live preview updates
  document.getElementById('symbol').addEventListener('input', updatePreview);
  document.getElementById('quantity').addEventListener('input', updatePreview);
  document.getElementById('price').addEventListener('input', updatePreview);
  updatePreview();
</script>
</body>
</html>
